services:
  - type: web
    name: janmitra
    env: node
    buildCommand: npm install && npm run build
    startCommand: node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
